version: '3.9'

# Local development stack for Clouddle Phase 1.
# Simulates the GCP environment without needing a live GCP project.
#
# Prerequisites:
#   - Docker Desktop
#   - A real Omada controller accessible from your machine (or use the mock)
#   - Copy .env.example to .env and fill in your Omada credentials

services:

  # ── Network adapter service ─────────────────────────────────────────────
  network-adapter:
    build:
      context: ./services/network-adapter-service
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      GCP_PROJECT_ID: "clouddle-local"
      OMADA_TYPE: "omada"
      OMADA_BASE_URL: ${OMADA_BASE_URL}         # e.g. https://192.168.1.100:8043
      OMADA_CONTROLLER_ID: ${OMADA_CONTROLLER_ID}
      OMADA_SITE_ID: ${OMADA_SITE_ID}
      OMADA_CLIENT_ID: ${OMADA_CLIENT_ID}
      OMADA_CLIENT_SECRET: ${OMADA_CLIENT_SECRET}  # for local dev only; prod uses Secret Manager
      OMADA_PPSK_PROFILE_ID: ${OMADA_PPSK_PROFILE_ID}
      OMADA_MODE: ${OMADA_MODE:-local}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Resident service ────────────────────────────────────────────────────
  resident-service:
    build:
      context: ./services/resident-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      GCP_PROJECT_ID: "clouddle-local"
      NETWORK_ADAPTER_URL: "http://network-adapter:8080"
      FIRESTORE_EMULATOR_HOST: "firestore-emulator:8200"
      PUBSUB_EMULATOR_HOST: "pubsub-emulator:8085"
      ALLOYDB_URL: "postgres://clouddle:clouddle@postgres:5432/clouddle?sslmode=disable"
    depends_on:
      network-adapter:
        condition: service_healthy
      postgres:
        condition: service_healthy
      firestore-emulator:
        condition: service_started

  # ── Firebase emulator (Firestore + Auth) ────────────────────────────────
  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    command: >
      bash -c "gcloud emulators firestore start
               --host-port=0.0.0.0:8200
               --project=clouddle-local"
    ports:
      - "8200:8200"
    environment:
      CLOUDSDK_CORE_PROJECT: "clouddle-local"

  # ── Pub/Sub emulator ────────────────────────────────────────────────────
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    command: >
      bash -c "gcloud beta emulators pubsub start
               --host-port=0.0.0.0:8085
               --project=clouddle-local"
    ports:
      - "8085:8085"

  # ── AlloyDB local substitute (Postgres) ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clouddle
      POSTGRES_PASSWORD: clouddle
      POSTGRES_DB: clouddle
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d  # auto-runs migrations on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clouddle"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── React property portal ────────────────────────────────────────────────
  portal:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    volumes:
      - ./portal:/app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_RESIDENT_SERVICE_URL: "http://localhost:8080"
      REACT_APP_FIREBASE_API_KEY: ${FIREBASE_API_KEY}
      REACT_APP_FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN}
      REACT_APP_FIREBASE_PROJECT_ID: "clouddle-local"

volumes:
  postgres-data:
